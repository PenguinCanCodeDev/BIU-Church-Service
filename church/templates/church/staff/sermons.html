<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Sermons | Staff</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 2rem; margin: 0; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .glass { background: var(--card); padding: 2rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 2rem; }
        h1 { margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; font-size: 1.8rem; }
        form { display: flex; flex-direction: column; gap: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 600; opacity: 0.8; }
        input, select, textarea { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); padding: 0.8rem; border-radius: 10px; color: white; width: 100%; font-family: inherit; font-size: 0.95rem; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); }
        button { background: var(--primary); color: white; border: none; padding: 1rem; border-radius: 10px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-size: 1rem; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .success { color: #22c55e; margin-bottom: 1rem; font-size: 0.9rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        .nav-staff { margin-bottom: 2rem; display: flex; gap: 1rem; opacity: 0.7; flex-wrap: wrap; }
        .nav-staff a { color: white; text-decoration: none; font-size: 0.9rem; font-weight: 500; }

        @media (max-width: 768px) {
            body { padding: 1.5rem 1rem; }
            h1 { font-size: 1.5rem; }
            .nav-staff { gap: 0.8rem; font-size: 0.8rem; }
            .glass { padding: 1.5rem; }
            th:nth-child(3), td:nth-child(3) { display: none; } /* Hide date on small mobile tables */
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-staff">
            <a href="{% url 'manage_sermons' %}">Sermons</a> | 
            <a href="{% url 'manage_lyrics' %}">Lyrics</a> | 
            <a href="{% url 'manage_announcements' %}">Announcements</a> |
            <a href="{% url 'index' %}">View Site</a>
        </div>

        <h1><i class="bi bi-broadcast"></i> Upload Sermon</h1>
        
        {% if messages %}
            {% for message in messages %}
                <div class="success">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <div class="glass">
            <form method="POST">
                {% csrf_token %}
                <div>
                    <label>Sermon Title</label>
                    <input type="text" name="title" required placeholder="e.g. The Power of Faith">
                </div>
                <div>
                    <label>Service</label>
                    <select name="service" required>
                        {% for s in services %}
                            <option value="{{ s.id }}">{{ s.name }} ({{ s.get_day_of_week_display }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label>Date Preached</label>
                    <input type="date" name="date" required>
                </div>
                <div>
                    <label>Notes or Video Link</label>
                    <textarea name="notes" rows="4" placeholder="Description or URL..."></textarea>
                </div>
                <button type="submit">Publish Sermon</button>
            </form>
        </div>

        <h2>Recent Sermons</h2>
        <div class="glass" style="padding: 0;">
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Service</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody>
                    {% for s in sermons %}
                        <tr>
                            <td>{{ s.title }}</td>
                            <td>{{ s.service.name }}</td>
                            <td>{{ s.date_preached }}</td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
