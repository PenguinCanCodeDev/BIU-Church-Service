<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Lyrics | Staff</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary: #10b981; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 2rem; }
        .container { max-width: 800px; margin: 0 auto; }
        .glass { background: var(--card); padding: 2rem; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 2rem; }
        h1 { margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
        form { display: flex; flex-direction: column; gap: 1rem; }
        input, select, textarea { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); padding: 0.8rem; border-radius: 10px; color: white; width: 100%; }
        button { background: var(--primary); color: white; border: none; padding: 1rem; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .success { color: #22c55e; margin-bottom: 1rem; }
        .nav-staff { margin-bottom: 2rem; display: flex; gap: 1rem; opacity: 0.7; }
        .nav-staff a { color: white; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-staff">
            <a href="{% url 'manage_sermons' %}">Sermons</a> | 
            <a href="{% url 'manage_lyrics' %}">Lyrics</a> | 
            <a href="{% url 'manage_announcements' %}">Announcements</a> |
            <a href="{% url 'index' %}">View Site</a>
        </div>

        <h1><i class="bi bi-music-note-beamed"></i> Upload Lyrics</h1>
        
        {% if messages %}
            {% for message in messages %}
                <div class="success">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <div class="glass">
            <form method="POST">
                {% csrf_token %}
                <div>
                    <label>Song Title</label>
                    <input type="text" name="title" required placeholder="e.g. 10,000 Reasons">
                </div>
                <div>
                    <label>Service</label>
                    <select name="service" required>
                        {% for s in services %}
                            <option value="{{ s.id }}">{{ s.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label>Content (Full Lyrics)</label>
                    <textarea name="content" rows="10" required placeholder="Paste lyrics here..."></textarea>
                </div>
                <button type="submit">Add to Choir Library</button>
            </form>
        </div>
    </div>
</body>
</html>
