<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Staff Login | Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: var(--card); padding: 3rem; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { margin-bottom: 2rem; font-size: 1.5rem; }
        form { display: flex; flex-direction: column; gap: 1rem; text-align: left; }
        label { font-size: 0.8rem; opacity: 0.7; margin-bottom: 0.3rem; display: block; }
        input { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); padding: 1rem; border-radius: 12px; color: white; width: 100%; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; padding: 1rem; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 1rem; }
        .error { color: #f43f5e; font-size: 0.9rem; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Staff Portal</h1>
        <form method="post">
            {% csrf_token %}
            <div>
                <label>Username</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div>
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit">Sign In</button>
        </form>
        {% if form.errors %}
            <p class="error">Invalid username or password.</p>
        {% endif %}
    </div>
</body>
</html>
